groups:
  - name: target-app
    rules:
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[2m])) > 1.0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Latency Rate climbing up"
          description: "latency rates clmbing up gradually"
