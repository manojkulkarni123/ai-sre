global:
  scrape_interval: 15s 
  evaluation_interval: 15s 


alerting:
  alertmanagers:
    - static_configs:
        - targets:
           ["alertmanager:9093"]

rule_files:
  - "HighErrorRateAlert.yml"
  - "HighLatencyAlert.yml"
  - "ServiceDownAlert.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          app: "target-app"
  - job_name: "target-app"
    static_configs:
      - targets: ["target-app:8080"]